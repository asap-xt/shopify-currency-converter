# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

name = "dual-currency-display"
client_id = "YOUR_CLIENT_ID_HERE"
application_url = "https://your-app-url.railway.app"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,read_orders,read_themes"

[auth]
redirect_urls = [
  "https://your-app-url.railway.app/auth/callback"
]

[webhooks]
api_version = "2023-07"

[pos]
embedded = false

[[extensions]]
type = "theme_app_extension"
name = "Dual Currency Display"
handle = "dual-currency-display"

[extensions.extension_points]