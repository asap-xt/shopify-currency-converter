[providers]
node = "18"

[variables]
NODE_ENV = "production"
NPM_CONFIG_LEGACY_PEER_DEPS = "true"

[phases.setup]
nixPkgs = ["nodejs_18", "npm-9_x"]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = [
  "npm run db:generate",
  "npm run build"
]

[start]
cmd = "npm start"