# shopify.app.toml

name = "eurozone-dual-currency-display"
client_id = "94be870f0498bac664dfccb02475dfa4"
application_url = "https://shopify-currency-converter-production.up.railway.app"
embedded = true

[auth]
redirect_urls = [
  "https://shopify-currency-converter-production.up.railway.app/auth/callback",
  "https://shopify-currency-converter-production.up.railway.app/callback"
]

[webhooks]
api_version = "2024-01"

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = true
dev_store_url = "https://asapxt-teststore.myshopify.com"
include_config_on_deploy = true

[access_scopes]
# Updated scopes to match what's in your index.js file
scopes = "read_products,write_products,read_themes,write_themes"

# App proxy for embedded functionality (optional but recommended)
[app_proxy]
url = "https://shopify-currency-converter-production.up.railway.app"
subpath = "apps/currency-converter"
prefix = "apps"