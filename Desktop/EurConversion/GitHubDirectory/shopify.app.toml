# shopify.app.toml

# 1. Основни мета данни
name             = "shopify-multicurrency-app"
client_id        = "d2b46433a7a46a72f4a6b7930ac0a71f"  
application_url  = "https://shopify-currency-converter.railway.com"
embedded         = true

# 2. Къде са extension-ите
extension_directories = ["extensions/"]

# 3. OAuth скопове
[access_scopes]
scopes = "read_orders,write_themes"

# 4. OAuth redirect URL — ЗАДЪЛЖИТЕЛНО точният ти публичен domain
[auth]
redirect_urls = [
  "https://shopify-currency-converter.railway.com/auth/callback"
]

# 5. Webhooks — CLI изисква този секшън
[webhooks]
api_version = "2025-01"

[[webhooks.subscriptions]]
topics            = ["app/uninstalled"]
compliance_topics = ["customers/redact","customers/data_request","shop/redact"]
uri               = "/webhooks"

# 6. Build настройки
[build]
include_config_on_deploy = true
